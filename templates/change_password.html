<html lang="en">
  <head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Change Password</title>
  </head>

  <body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white roudned-3xl border border-slate-200 shadow-2xl p-10">
      <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-xl"></i>
      </div>
      <h2 class="text-2xl font-black text-slate-900 tracking-tight">Change Password</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-6 p-4 rounded-xl text-sm font-bold flex items-center gap-3 {% if category == 'error' %} bg-red-50 border border-red-100 text-red-700 {% else %} bg-emerald-50 border border-emerald-100 text-emerald-700 {% endif %}">
            <i class="fas {% if category== 'error' %} fa-exclamation-circle {% else %} fa-check-circle {% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div>
        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wides mb-2 ml-1">Current Password</label>
        <input type="password" name="current_password" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-600 focus:outline-none transition-all">
      </div>
      <div class="pt-2">
        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">New Password</label>
        <input type="password" name="new_password" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-600 focus:outline-none transition-all">
      </div>
      <div class="pt-2">
        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
        <input type="password" name="confirm_password" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-600 focus:outline-none transition-all">
      </div>
      <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition-all mt-4">
      Update Password
      </button>
      <a href="{{ url_for('main.homepage') }}" class="block text-center text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors mt-4">
      Back to Homepage
      </a>
    </form>
   </div>
  </body>
</html>
